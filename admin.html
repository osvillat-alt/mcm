<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — MCM Repostería</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===========================
       ADMIN — BASE
    =========================== */
    .admin-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    .admin-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .admin-top h2 {
      margin: 0;
      font-size: 22px;
    }

    .tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, .10);
      background: rgba(246, 183, 200, .25);
      font-weight: 800;
      font-size: 11px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===========================
       TOAST NOTIFICATION
    =========================== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1b1b1b;
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { background: #2d6a4f; }
    #toast.error   { background: #c0392b; }

    /* ===========================
       FORM CARD
    =========================== */
    #formCard {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    #formCard h3 {
      margin: 0 0 16px;
      font-size: 17px;
      color: var(--choco);
    }

    .form-fields {
      display: grid;
      gap: 14px;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .form-row-2 { grid-template-columns: 1fr; }
    }

    /* image upload re-use the shared styles from styles.css */

    /* ===========================
       PRODUCT LIST
    =========================== */
    #listCard {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
    }

    #listCard h3 {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .prod-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 12px 10px;
      border: 1px solid rgba(0,0,0,.07);
      border-radius: 14px;
      background: #fff;
      margin-bottom: 10px;
      align-items: center;
    }

    .prod-thumb {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      background: rgba(0,0,0,.04);
      flex-shrink: 0;
    }

    .prod-info h4 {
      margin: 0 0 2px;
      font-size: 14px;
    }

    .prod-info .prod-cat {
      font-size: 11px;
      color: var(--muted);
      text-transform: capitalize;
    }

    .prod-info .prod-price {
      font-weight: 900;
      color: var(--choco);
      font-size: 14px;
      margin: 4px 0 8px;
    }

    .prod-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .prod-actions button {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all .15s ease;
    }

    .btn-edit {
      background: rgba(246,183,200,.4);
      border-color: rgba(246,183,200,.8) !important;
      color: var(--choco);
    }

    .btn-edit:hover { background: rgba(246,183,200,.7); }

    .btn-toggle-vis {
      background: rgba(255,255,255,.9);
      border-color: rgba(0,0,0,.12) !important;
      color: #555;
    }

    .btn-toggle-vis.visible { color: #2d6a4f; border-color: rgba(45,106,79,.25) !important; background: rgba(45,106,79,.08); }
    .btn-toggle-vis.draft   { color: #e07c00; border-color: rgba(224,124,0,.25) !important; background: rgba(255,200,80,.1); }

    .btn-delete {
      background: rgba(192,57,43,.07);
      border-color: rgba(192,57,43,.2) !important;
      color: #c0392b;
    }

    .btn-delete:hover { background: rgba(192,57,43,.15); }

    .draft-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      background: rgba(255,180,60,.2);
      color: #b87200;
      border-radius: 999px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ===========================
       FAB — Floating Action Button
    =========================== */
    #fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--choco), var(--choco-2));
      color: #fff;
      font-size: 28px;
      font-weight: 400;
      border: none;
      box-shadow: 0 8px 22px rgba(75,47,36,.4);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    #fab:hover { transform: scale(1.08); box-shadow: 0 12px 28px rgba(75,47,36,.5); }
    #fab:active { transform: scale(0.95); }

    /* ===========================
       LOGIN
    =========================== */
    #loginBox {
      padding: 24px 20px;
      text-align: center;
    }

    #loginBox h3 { margin: 0 0 8px; }
    #loginBox p  { margin: 0 0 16px; }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="./index.html" aria-label="Volver a MCM">
        <img src="./assets/logo.png" alt="MCM" class="brand-logo" />
      </a>
      <div class="topbar-actions" style="display:flex; gap:10px; align-items:center;">
        <span id="userChip" class="tag" style="display:none;"></span>
        <button id="logoutBtn" class="btn ghost" style="display:none;" type="button">Salir</button>
        <a class="cta" href="./index.html">Ver tienda</a>
      </div>
    </div>
  </header>

  <main class="admin-wrap">

    <div class="admin-top">
      <h2>Catálogo</h2>
    </div>

    <!-- LOGIN -->
    <section id="loginBox" class="card">
      <h3>Panel de administración</h3>
      <p class="muted">Solo usuarios autorizados pueden editar productos.</p>
      <button id="loginGoogle" class="btn primary" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align:middle; margin-right:6px;">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Entrar con Google
      </button>
    </section>

    <!-- ADMIN PANEL -->
    <section id="adminPanel" style="display:none;">

      <!-- FORM CARD -->
      <div id="formCard">
        <h3 id="formTitle">➕ Nuevo producto</h3>

        <div class="form-fields">
          <div class="form-row-2">
            <label>Nombre del producto
              <input id="pName" type="text" placeholder="Ej. Pay de oreo" />
            </label>
            <label>Precio (MXN)
              <input id="pPrice" type="number" min="0" placeholder="Ej. 300" />
            </label>
          </div>

          <label>Categoría
            <select id="pCategory">
              <option value="">— Selecciona —</option>
              <option value="pasteles">Pasteles</option>
              <option value="pays">Pays</option>
              <option value="galletas">Galletas</option>
              <option value="roles">Roles</option>
              <option value="postres">Postres</option>
              <option value="otro">Otra (escribe abajo)</option>
            </select>
          </label>

          <label id="customCatLabel" style="display:none;">Nombre de la categoría
            <input id="pCategoryCustom" type="text" placeholder="Ej. Cheesecakes" />
          </label>

          <label>Descripción
            <textarea id="pDesc" placeholder="Ej. Pay de oreo 20 cm, base crema..." style="min-height:70px;"></textarea>
          </label>

          <!-- IMAGE UPLOAD — same pattern as index.html -->
          <div class="upload-container">
            <label>Imagen del producto</label>
            <div class="upload-area" id="adminUploadArea">
              <input type="file" id="adminFileInput" accept="image/*" style="display:none;" />

              <div class="upload-prompt" id="adminUploadPrompt">
                <div class="upload-icon">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
                    <circle cx="9" cy="9" r="2"/>
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
                  </svg>
                </div>
                <span class="upload-text">Presiona para seleccionar foto o arrastra aquí</span>
                <span class="upload-subtext">JPG, PNG — Máx. 5 MB</span>
              </div>

              <div class="upload-loading" id="adminUploadLoading" style="display:none;">
                <div class="spinner"></div>
                <span id="adminUploadLoadingText">Subiendo imagen...</span>
                <div class="progress-bar-container">
                  <div class="progress-bar" id="adminProgressBar" style="width:0%;"></div>
                </div>
              </div>

              <div class="upload-preview-container" id="adminUploadPreviewContainer" style="display:none;">
                <img id="adminUploadPreview" src="" alt="Vista previa" />
                <div class="preview-actions">
                  <button type="button" class="btn-remove-image" id="adminBtnRemoveImage">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px; vertical-align:middle;">
                      <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>
                    </svg>
                    Cambiar imagen
                  </button>
                </div>
              </div>
            </div>
            <!-- Hidden field stores final image URL -->
            <input id="adminImageUrl" type="hidden" />
          </div>

          <!-- FORM ACTIONS -->
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
            <button id="saveProduct" class="btn primary" type="button" style="flex:1;">Guardar producto</button>
            <button id="cancelEdit" class="btn ghost" type="button" style="display:none;">Cancelar</button>
          </div>
        </div>
      </div>

      <!-- PRODUCTS LIST -->
      <div id="listCard">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;">
          <h3 style="margin:0;">Mis productos</h3>
          <button id="refreshList" class="btn ghost" type="button" style="padding:8px 14px; font-size:13px;">↺ Actualizar</button>
        </div>
        <div id="productsList"></div>
      </div>

    </section>
  </main>

  <!-- Floating Add button (visible on mobile when form is not in view) -->
  <button id="fab" type="button" title="Nuevo producto" style="display:none;" aria-label="Agregar producto">＋</button>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./admin.js?v=4"></script>
</body>

</html>
